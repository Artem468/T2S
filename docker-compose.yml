services:
  # GPU: docker-compose.gpu.yml; Windows: scripts\docker-compose-with-gpu.cmd или .ps1; Linux/macOS: .sh
  ollama-service:
    image: ollama/ollama:latest
    container_name: ollama_sql
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    entrypoint: /bin/sh -c "ollama serve & sleep 5 && ollama pull stable-code:3b && wait"
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  t2s-db:
    image: postgres:15
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: always
    networks:
      - app-network

  t2s-django:
    build:
      context: ./t2s_backend
      dockerfile: Dockerfile
    container_name: t2s-django
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput --clear &&
             python manage.py initadmin &&
             uvicorn t2s_backend.asgi:application --host 0.0.0.0 --port 8000 --workers 1"
    working_dir: /app
    volumes:
      - static_volume:/app/static
      - ./incity.db:/app/incity.db:ro
    expose:
      - "8000"
    env_file: .env
    depends_on:
      ollama-service:
        condition: service_healthy
      t2s-db:
        condition: service_started
      redis:
        condition: service_started
    restart: always
    networks:
      - app-network

  celery:
    container_name: celery_worker
    build:
      context: ./t2s_backend
      dockerfile: Dockerfile
    command: >
      celery -A t2s_backend worker --loglevel=INFO
    volumes:
      - static_volume:/app/static
      - ./incity.db:/app/incity.db:ro
    env_file: .env
    depends_on:
      ollama-service:
        condition: service_healthy
      t2s-django:
        condition: service_started
      redis:
        condition: service_started
    restart: always
    networks:
      - app-network

  redis:
    container_name: redis
    image: redis:7-alpine
    command: [ "redis-server", "--save", "", "--appendonly", "no" ]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - app-network

  t2s-nginx:
    image: nginx:1.27-alpine
    container_name: t2s-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/static
    depends_on:
      - t2s-django
    restart: always
    networks:
      - app-network

volumes:
  postgres_data:
  static_volume:
  redis_data:
  ollama_storage:

networks:
  app-network:
    driver: bridge